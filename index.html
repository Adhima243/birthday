<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthdayy!!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#6B4226",
              secondary: "#A67B5B",
              soft: "#D2B48C",
              cream: "#F5E6D3",
              accent: "#8B5E3C",
            },
            fontFamily: {
              poppins: ['Poppins', 'sans-serif'],
              playfair: ['Playfair Display', 'serif'],
            },
            animation: {
              fadeIn: 'fadeIn 0.8s ease-in',
              slideUp: 'slideUp 0.8s ease-out',
              floating: 'floating 3s ease-in-out infinite',
              typewriter: 'typewriter 2s steps(40, end)',
              confetti: 'confetti 3s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              floating: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              typewriter: {
                '0%': { width: '0' },
                '100%': { width: '100%' },
              },
              confetti: {
                '0%': { opacity: '1', transform: 'translateY(0) rotate(0deg)' },
                '100%': { opacity: '0', transform: 'translateY(500px) rotate(720deg)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap');
      
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: #f5e6d3;
      }

      .heading {
        font-family: 'Playfair Display', serif;
        font-size: 3rem;
        font-weight: 700;
      }

      @media (max-width: 768px) {
        .heading {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
